<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Media Viewer</title>
  <link rel="stylesheet" href="viewer.css" />
</head>

<body>
  <div class="container">
    <div id="left-side" class="panel">
      <div class="slot" id="left-slot-a"></div>
      <div class="slot" id="left-slot-b"></div>
    </div>
    <div id="right-side" class="panel">
      <div class="slot" id="right-slot-a"></div>
      <div class="slot" id="right-slot-b"></div>
    </div>
  </div>
  <div id="fullscreen-overlay">
    <div class="slot" id="fs-slot-a"></div>
    <div class="slot" id="fs-slot-b"></div>
  </div>

  <script src="viewer.js"></script>
</body>

</html>
